<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobot - Formulario de eliminacion de cuenta</title>
    <meta
      name="description"
      content="Formulario oficial para solicitar eliminacion de cuenta y datos de Autobot."
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #ffffff;
        color: #0f172a;
        line-height: 1.6;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }
      h1 {
        font-size: clamp(1.8rem, 3vw, 2.3rem);
        margin: 0 0 8px;
      }
      h2 {
        font-size: 1.2rem;
        margin-top: 28px;
        margin-bottom: 8px;
      }
      p,
      label {
        color: #334155;
      }
      .muted {
        color: #64748b;
        margin-top: 0;
      }
      form {
        margin-top: 24px;
        display: grid;
        gap: 14px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      textarea {
        min-height: 120px;
      }
      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .check-row input {
        width: auto;
        margin-top: 4px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        width: fit-content;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Formulario de eliminacion de cuenta (Autobot)</h1>
      <p class="muted">
        Completa este formulario para solicitar la eliminacion de tu cuenta y datos asociados.
      </p>

      <form
        action="mailto:privacidad@tudominio.com?subject=Solicitud%20de%20eliminacion%20Autobot"
        method="post"
        enctype="text/plain"
      >
        <div>
          <label for="fullName">Nombre completo</label>
          <input id="fullName" name="Nombre completo" type="text" required />
        </div>

        <div>
          <label for="email">Correo asociado a la cuenta</label>
          <input id="email" name="Correo" type="email" required />
        </div>

        <div>
          <label for="phone">Telefono (opcional)</label>
          <input id="phone" name="Telefono" type="tel" />
        </div>

        <div>
          <label for="reason">Motivo de la solicitud</label>
          <textarea id="reason" name="Motivo" required></textarea>
        </div>

        <label class="check-row" for="confirm">
          <input id="confirm" name="Confirmacion" type="checkbox" required />
          <span>
            Confirmo que soy titular de la cuenta y solicito voluntariamente la eliminacion de
            mi cuenta y datos, sujeto a los periodos legales de retencion.
          </span>
        </label>

        <button type="submit">Enviar solicitud</button>
      </form>

      <h2>Contacto alterno</h2>
      <p>
        Si prefieres, puedes solicitar la eliminacion por correo en
        <a href="mailto:privacidad@tudominio.com">privacidad@tudominio.com</a>.
      </p>

      <p>
        Volver al sitio principal:
        <a href="/">https://intelekia.cloud/</a>
      </p>
    </main>
  </body>
</html>
